<style>
        body {
            background-color: #F6F6F4; /* Ensuring the specific off-white is applied */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="text-on-surface antialiased min-h-screen flex flex-col relative pb-24 font-body-sm">
<!-- Top AppBar Equivalent / Member Name -->
<header class="w-full px-container-padding py-stack-md border-b border-outline bg-surface">
<h1 class="font-display text-display text-on-surface">Alex Rodriguez</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding py-stack-lg flex flex-col gap-stack-lg">
<section class="flex flex-col">
<h2 class="font-label text-label uppercase text-on-surface-variant mb-stack-md">Choose a template</h2>
<div class="flex flex-col border-t border-outline">
<!-- List Item 1 - Selected -->
<button class="flex justify-between items-center py-stack-md border-b border-outline group text-left" onclick="selectTemplate(this)">
<span class="font-body-lg text-body-lg text-on-surface">Hypertrophy Block A</span>
<div class="w-5 h-5 rounded-full border-2 border-on-surface flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-on-surface indicator"></div>
</div>
</button>
<!-- List Item 2 -->
<button class="flex justify-between items-center py-stack-md border-b border-outline group text-left" onclick="selectTemplate(this)">
<span class="font-body-lg text-body-lg text-on-surface">Strength Peaking (4 Weeks)</span>
<div class="w-5 h-5 rounded-full border border-outline flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-transparent indicator"></div>
</div>
</button>
<!-- List Item 3 -->
<button class="flex justify-between items-center py-stack-md border-b border-outline group text-left" onclick="selectTemplate(this)">
<span class="font-body-lg text-body-lg text-on-surface">Endurance &amp; Core Intro</span>
<div class="w-5 h-5 rounded-full border border-outline flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-transparent indicator"></div>
</div>
</button>
<!-- List Item 4 -->
<button class="flex justify-between items-center py-stack-md border-b border-outline group text-left" onclick="selectTemplate(this)">
<span class="font-body-lg text-body-lg text-on-surface">Rehab: Shoulder Focus</span>
<div class="w-5 h-5 rounded-full border border-outline flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-transparent indicator"></div>
</div>
</button>
</div>
</section>
<section class="flex flex-col">
<button class="w-full py-3 bg-surface border border-outline text-on-surface font-body-lg text-body-lg rounded-lg hover:bg-surface-container transition-colors">
                Or Build Custom Plan
            </button>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-surface border-t border-outline">
<button class="w-full py-4 bg-black text-on-primary font-body-lg text-body-lg rounded-lg hover:opacity-90 transition-opacity">
            Assign Plan
        </button>
</div>
<script>
        function selectTemplate(clickedBtn) {
            // Reset all indicators
            const allBtns = document.querySelectorAll('main section:first-of-type button');
            allBtns.forEach(btn => {
                const outerCircle = btn.querySelector('div.rounded-full');
                const innerCircle = btn.querySelector('.indicator');
                
                outerCircle.classList.remove('border-2', 'border-on-surface');
                outerCircle.classList.add('border', 'border-outline');
                
                innerCircle.classList.remove('bg-on-surface');
                innerCircle.classList.add('bg-transparent');
            });

            // Set clicked indicator
            const clickedOuter = clickedBtn.querySelector('div.rounded-full');
            const clickedInner = clickedBtn.querySelector('.indicator');

            clickedOuter.classList.remove('border', 'border-outline');
            clickedOuter.classList.add('border-2', 'border-on-surface');
            
            clickedInner.classList.remove('bg-transparent');
            clickedInner.classList.add('bg-on-surface');
        }
    </script>
</body></html>
