<style>

<body class="bg-inverse-on-surface font-body-sm text-body-sm text-on-surface min-h-screen flex flex-col items-center justify-center px-container-padding antialiased selection:bg-surface-tint selection:text-on-primary">
<main class="w-full max-w-sm flex flex-col items-center w-full">
<!-- Header -->
<header class="flex flex-col items-center mb-stack-lg">
<h1 class="font-display text-display uppercase tracking-[0.2em] font-black text-on-background">FITTRACK</h1>
<p class="font-label text-label text-outline mt-unit">Owner</p>
</header>
<!-- Login Form Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant p-container-padding">
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Username Field -->
<div class="flex flex-col gap-unit">
<label class="font-label text-label uppercase text-on-surface-variant" for="username">Username</label>
<input autocomplete="username" class="w-full h-12 border border-outline-variant bg-surface-container-lowest px-3 font-body-lg text-body-lg text-on-background focus:outline-none focus:border-on-background transition-colors" id="username" placeholder="owner@gym.co" spellcheck="false" type="text"/>
</div>
<!-- PIN Field -->
<div class="flex flex-col gap-unit">
<label class="font-label text-label uppercase text-on-surface-variant" for="pin-1">PIN</label>
<div class="flex justify-between gap-unit">
<input class="w-14 h-14 border border-outline-variant bg-surface-container-lowest text-center font-data-lg text-data-lg text-on-background focus:outline-none focus:border-on-background transition-colors" id="pin-1" inputmode="numeric" maxlength="1" type="password"/>
<input class="w-14 h-14 border border-outline-variant bg-surface-container-lowest text-center font-data-lg text-data-lg text-on-background focus:outline-none focus:border-on-background transition-colors" id="pin-2" inputmode="numeric" maxlength="1" type="password"/>
<input class="w-14 h-14 border border-outline-variant bg-surface-container-lowest text-center font-data-lg text-data-lg text-on-background focus:outline-none focus:border-on-background transition-colors" id="pin-3" inputmode="numeric" maxlength="1" type="password"/>
<input class="w-14 h-14 border border-outline-variant bg-surface-container-lowest text-center font-data-lg text-data-lg text-on-background focus:outline-none focus:border-on-background transition-colors" id="pin-4" inputmode="numeric" maxlength="1" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 mt-stack-md bg-on-background text-on-error rounded-lg font-label text-label uppercase tracking-widest hover:bg-surface-tint transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-on-background" type="submit">
                    Log In
                </button>
</form>
</div>
<!-- Footer Link -->
<a class="mt-stack-lg font-label text-label text-outline hover:text-on-background transition-colors" href="#">Forgot PIN?</a>
</main>
<script>
        // Simple auto-advance for PIN inputs to demonstrate micro-interaction
        const pinInputs = document.querySelectorAll('input[type="password"]');
        pinInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < pinInputs.length - 1) {
                    pinInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    pinInputs[index - 1].focus();
                }
            });
        });
    </script>
