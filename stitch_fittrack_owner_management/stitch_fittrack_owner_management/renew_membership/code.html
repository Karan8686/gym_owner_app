<style>
        /* Custom Utility for hair-line borders specific to minimal brief */
        .border-hairline {
            border-width: 1px;
            border-color: #E4E4E1;
        }
        .bg-offwhite {
            background-color: #F6F6F4;
        }
        .text-black-custom {
            color: #161616;
        }
        .bg-black-custom {
            background-color: #161616;
        }
        .border-active {
            border-width: 2px;
            border-color: #161616;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-offwhite text-on-surface antialiased min-h-screen flex flex-col justify-between">
<!-- Top AppBar Semantic Shell (Transaction intent - NO NAV SHELL) -->
<header class="w-full flex justify-between items-center px-container-padding h-16 border-b border-hairline bg-surface-container-lowest">
<!-- Back action implies transactional intent -->
<button aria-label="Go back" class="flex items-center justify-center p-2 -ml-2" type="button">
<span class="material-symbols-outlined text-on-surface">chevron_left</span>
</button>
<span class="font-headline text-headline text-on-background font-bold tracking-tight">Renew</span>
<div class="w-8"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col px-container-padding py-stack-lg gap-stack-lg max-w-md mx-auto w-full">
<!-- Member Info -->
<section class="flex flex-col gap-unit">
<h1 class="font-display text-display text-black-custom">Sarah Jenkins</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Standard Plan • Expired Oct 12, 2023</p>
</section>
<!-- Renewal Options -->
<section class="flex flex-col gap-stack-md mt-stack-md">
<h2 class="font-label text-label text-on-surface-variant uppercase tracking-wider">Renew For</h2>
<div class="grid grid-cols-2 gap-stack-sm" id="duration-toggles">
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border-active rounded font-body-sm text-body-sm text-black-custom font-medium transition-colors" data-duration="1" data-months="1" data-price="45.00" type="button">
                    1 Month
                </button>
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border-hairline rounded font-body-sm text-body-sm text-on-surface-variant hover:border-black transition-colors" data-duration="3" data-months="3" data-price="120.00" type="button">
                    Quarterly
                </button>
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border-hairline rounded font-body-sm text-body-sm text-on-surface-variant hover:border-black transition-colors" data-duration="6" data-months="6" data-price="220.00" type="button">
                    Half-Yearly
                </button>
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border-hairline rounded font-body-sm text-body-sm text-on-surface-variant hover:border-black transition-colors" data-duration="12" data-months="12" data-price="400.00" type="button">
                    Yearly
                </button>
</div>
</section>
<!-- Price Display -->
<section class="flex flex-col items-center justify-center py-stack-lg bg-surface-container-lowest border-hairline rounded-lg mt-stack-sm">
<span class="font-label text-label text-on-surface-variant uppercase mb-unit">Total Price</span>
<div class="flex items-baseline gap-1">
<span class="font-data-lg text-data-lg text-black-custom text-2xl font-bold">$</span>
<span class="font-data-lg text-data-lg text-black-custom text-5xl font-bold tracking-tighter" id="price-display">45.00</span>
</div>
</section>
<!-- Due Date Calculation -->
<section class="flex justify-between items-center py-stack-sm border-b border-hairline">
<span class="font-label text-label text-on-surface-variant uppercase">New Due Date</span>
<span class="font-data-lg text-data-lg text-black-custom font-bold" id="date-display">Nov 12, 2023</span>
</section>
</main>
<!-- Bottom Action (Sticky) -->
<footer class="w-full bg-offwhite px-container-padding pb-container-padding pt-stack-sm mt-auto">
<button class="w-full bg-black-custom text-on-primary font-body-lg text-body-lg font-medium h-14 rounded-lg flex items-center justify-center hover:opacity-90 transition-opacity" type="button">
            Confirm Renewal
        </button>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggles = document.querySelectorAll('#duration-toggles button');
            const priceDisplay = document.getElementById('price-display');
            const dateDisplay = document.getElementById('date-display');
            
            // Base date to calculate from (mocked to match the prompt's expired date context)
            const baseDate = new Date('2023-10-12');

            function formatDate(date) {
                const options = { month: 'short', day: 'numeric', year: 'numeric' };
                return date.toLocaleDateString('en-US', options);
            }

            toggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    // Reset all
                    toggles.forEach(t => {
                        t.classList.remove('border-active', 'text-black-custom', 'font-medium');
                        t.classList.add('border-hairline', 'text-on-surface-variant');
                    });
                    
                    // Set active
                    this.classList.remove('border-hairline', 'text-on-surface-variant');
                    this.classList.add('border-active', 'text-black-custom', 'font-medium');

                    // Update price
                    priceDisplay.textContent = this.getAttribute('data-price');

                    // Update date
                    const monthsToAdd = parseInt(this.getAttribute('data-months'));
                    let newDate = new Date(baseDate);
                    newDate.setMonth(newDate.getMonth() + monthsToAdd);
                    dateDisplay.textContent = formatDate(newDate);
                });
            });
        });
    </script>
