<body class="bg-background text-on-background min-h-screen flex flex-col font-body-sm text-body-sm relative">
<!-- Top App Bar -->
<header class="bg-surface text-on-background flex justify-between items-center w-full px-container-padding h-16 border-b border-outline-variant docked full-width top-0 z-40 sticky">
<button class="text-on-surface-variant hover:bg-surface-container transition-colors p-unit rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline text-headline font-black">Add Member</h1>
<div class="w-8"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 px-container-padding py-stack-lg overflow-y-auto pb-[100px]">
<form class="flex flex-col gap-stack-lg">
<!-- Standard Details -->
<div class="flex flex-col gap-0 border-t border-outline-variant">
<div class="py-stack-md border-b border-outline-variant flex flex-col gap-unit">
<label class="font-label text-label text-on-surface-variant uppercase" for="memberName">Name</label>
<input class="bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg text-on-background placeholder-outline w-full outline-none" id="memberName" name="memberName" placeholder="Enter full name" type="text"/>
</div>
<div class="py-stack-md border-b border-outline-variant flex flex-col gap-unit">
<label class="font-label text-label text-on-surface-variant uppercase" for="memberPhone">Phone Number</label>
<input class="bg-transparent border-none p-0 focus:ring-0 font-data-lg text-data-lg text-on-background placeholder-outline w-full outline-none" id="memberPhone" name="memberPhone" placeholder="(555) 000-0000" type="tel"/>
</div>
<div class="py-stack-md border-b border-outline-variant flex flex-col gap-unit">
<label class="font-label text-label text-on-surface-variant uppercase" for="startDate">Start Date</label>
<input class="bg-transparent border-none p-0 focus:ring-0 font-data-lg text-data-lg text-on-background w-full outline-none" id="startDate" name="startDate" type="date"/>
</div>
</div>
<!-- Plan Selection -->
<div class="flex flex-col gap-stack-sm">
<span class="font-label text-label text-on-surface-variant uppercase">Plan</span>
<div class="grid grid-cols-2 gap-gutter">
<!-- Selected State Example -->
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="planType" type="radio" value="weight"/>
<div class="border border-on-background rounded-lg py-3 px-4 text-center bg-on-background text-on-tertiary font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary">
                            Weight Only
                        </div>
</label>
<!-- Unselected State Example -->
<label class="cursor-pointer">
<input class="peer sr-only" name="planType" type="radio" value="cardio_weight"/>
<div class="border border-on-background rounded-lg py-3 px-4 text-center bg-transparent text-on-background font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary hover:bg-surface-variant">
                            Cardio + Weight
                        </div>
</label>
</div>
</div>
<!-- Duration Selection -->
<div class="flex flex-col gap-stack-sm">
<span class="font-label text-label text-on-surface-variant uppercase">Duration</span>
<div class="flex flex-wrap gap-stack-sm">
<!-- Selected State Example -->
<label class="cursor-pointer flex-1 min-w-[80px]">
<input checked="" class="peer sr-only" name="planDuration" type="radio" value="1_month"/>
<div class="border border-on-background rounded-lg py-2 px-3 text-center bg-on-background text-on-tertiary font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary">
                            1 Month
                        </div>
</label>
<!-- Unselected State Example -->
<label class="cursor-pointer flex-1 min-w-[80px]">
<input class="peer sr-only" name="planDuration" type="radio" value="quarterly"/>
<div class="border border-on-background rounded-lg py-2 px-3 text-center bg-transparent text-on-background font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary hover:bg-surface-variant">
                            Quarterly
                        </div>
</label>
<label class="cursor-pointer flex-1 min-w-[80px]">
<input class="peer sr-only" name="planDuration" type="radio" value="half_yearly"/>
<div class="border border-on-background rounded-lg py-2 px-3 text-center bg-transparent text-on-background font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary hover:bg-surface-variant">
                            Half-Yearly
                        </div>
</label>
<label class="cursor-pointer flex-1 min-w-[80px]">
<input class="peer sr-only" name="planDuration" type="radio" value="yearly"/>
<div class="border border-on-background rounded-lg py-2 px-3 text-center bg-transparent text-on-background font-body-sm text-body-sm transition-colors peer-checked:bg-on-background peer-checked:text-on-tertiary hover:bg-surface-variant">
                            Yearly
                        </div>
</label>
</div>
</div>
<!-- Price Display -->
<div class="flex flex-col gap-unit items-end pt-stack-md mt-stack-md border-t border-outline-variant">
<span class="font-label text-label text-on-surface-variant uppercase">Total Due</span>
<span class="font-data-lg text-data-lg text-on-background font-bold text-3xl tracking-tight">$45.00</span>
</div>
</form>
</main>
<!-- Bottom Fixed Action Area -->
<div class="fixed bottom-0 w-full bg-surface border-t border-outline-variant p-container-padding z-50">
<button class="w-full bg-on-background text-on-tertiary font-body-lg text-body-lg font-medium py-3 rounded-lg hover:bg-opacity-90 transition-opacity">
            Save Member
        </button>
</div>
<!-- Scripts for dynamic styling logic if needed -->
<script>
        // Set today's date as default for Start Date
        document.addEventListener('DOMContentLoaded', (event) => {
            const dateInput = document.getElementById('startDate');
            if(dateInput) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
            }
        });
    </script>
</body></html>
