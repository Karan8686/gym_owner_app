<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plan Pricing - FitTrack Owner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#322f35",
                        "tertiary": "#765b00",
                        "surface-dim": "#ded8e0",
                        "on-secondary-fixed-variant": "#4b4263",
                        "tertiary-fixed-dim": "#e7c365",
                        "secondary-fixed-dim": "#cdc0e9",
                        "surface-container-high": "#ece6ee",
                        "on-secondary-container": "#645a7d",
                        "secondary-container": "#e1d4fd",
                        "surface-variant": "#e6e0e9",
                        "on-surface-variant": "#494551",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#1f1635",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f2ecf4",
                        "secondary-fixed": "#e9ddff",
                        "surface-container-low": "#f8f2fa",
                        "surface-tint": "#6750a4",
                        "background": "#fdf7ff",
                        "on-primary-fixed": "#22005d",
                        "primary-container": "#6750a4",
                        "on-background": "#1d1b20",
                        "tertiary-container": "#c9a74d",
                        "error": "#ba1a1a",
                        "surface-bright": "#fdf7ff",
                        "inverse-primary": "#cfbcff",
                        "primary": "#4f378a",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#241a00",
                        "primary-fixed": "#e9ddff",
                        "on-surface": "#1d1b20",
                        "tertiary-fixed": "#ffdf93",
                        "on-primary-container": "#e0d2ff",
                        "surface-container-highest": "#e6e0e9",
                        "on-tertiary-container": "#503d00",
                        "outline-variant": "#cbc4d2",
                        "on-tertiary-fixed-variant": "#594400",
                        "surface": "#fdf7ff",
                        "inverse-on-surface": "#f5eff7",
                        "outline": "#7a7582",
                        "on-primary": "#ffffff",
                        "secondary": "#63597c",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#cfbcff",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "container-padding": "24px",
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "label": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "data-lg": ["JetBrains Mono"],
                        "headline": ["Inter"],
                        "data-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "display": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "data-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline": ["18px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #F6F6F4; }
        /* Custom styles for minimalist input */
        .minimal-input {
            border: none;
            border-bottom: 1px solid #1d1b20;
            background: transparent;
            padding: 0;
            text-align: right;
            border-radius: 0;
        }
        .minimal-input:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: #1d1b20;
            border-bottom-width: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-lg text-on-background min-h-screen flex flex-col pb-24 md:hidden">
<!-- TopAppBar -->
<header class="bg-surface text-on-background docked full-width top-0 border-b border-outline-variant flat no shadows flex justify-between items-center w-full px-container-padding h-16 sticky z-50">
<button class="text-on-surface-variant hover:bg-surface-container transition-colors flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline text-headline font-black text-on-background">Plan Pricing</h1>
<div class="w-10"></div> <!-- Empty div for flex spacing -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding py-stack-md flex flex-col gap-stack-lg">
<!-- Weight Only Section -->
<section>
<h2 class="font-label text-label uppercase text-outline mb-stack-sm tracking-widest">Weight Only</h2>
<div class="bg-surface border border-outline-variant rounded-lg overflow-hidden flex flex-col">
<!-- 1 Month -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">1 Month</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="30"/>
</div>
</div>
<!-- Quarterly -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Quarterly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="80"/>
</div>
</div>
<!-- Half-Yearly -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Half-Yearly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="150"/>
</div>
</div>
<!-- Yearly -->
<div class="flex justify-between items-center px-4 py-3 bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Yearly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="280"/>
</div>
</div>
</div>
</section>
<!-- Hairline Divider -->
<hr class="border-t border-outline-variant mx-auto w-1/3"/>
<!-- Cardio + Weight Section -->
<section>
<h2 class="font-label text-label uppercase text-outline mb-stack-sm tracking-widest">Cardio + Weight</h2>
<div class="bg-surface border border-outline-variant rounded-lg overflow-hidden flex flex-col">
<!-- 1 Month -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">1 Month</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="45"/>
</div>
</div>
<!-- Quarterly -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Quarterly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="120"/>
</div>
</div>
<!-- Half-Yearly -->
<div class="flex justify-between items-center px-4 py-3 border-b border-outline-variant bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Half-Yearly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="220"/>
</div>
</div>
<!-- Yearly -->
<div class="flex justify-between items-center px-4 py-3 bg-surface">
<span class="font-body-lg text-body-lg text-on-background">Yearly</span>
<div class="flex items-center">
<span class="font-data-lg text-data-lg mr-1 text-on-background">$</span>
<input class="minimal-input font-data-lg text-data-lg w-16 text-on-background focus:ring-0" type="number" value="400"/>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Action Button -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-[#F6F6F4] z-40 border-t border-outline-variant md:hidden">
<button class="w-full bg-[#161616] text-[#FFFFFF] font-headline text-headline py-3 rounded-lg flex items-center justify-center transition-transform active:scale-[0.98]">
            Save Prices
        </button>
</div>
</body></html>
