<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitTrack - Edit Member</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#322f35",
                    "tertiary": "#765b00",
                    "surface-dim": "#ded8e0",
                    "on-secondary-fixed-variant": "#4b4263",
                    "tertiary-fixed-dim": "#e7c365",
                    "secondary-fixed-dim": "#cdc0e9",
                    "surface-container-high": "#ece6ee",
                    "on-secondary-container": "#645a7d",
                    "secondary-container": "#e1d4fd",
                    "surface-variant": "#e6e0e9",
                    "on-surface-variant": "#494551",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#1f1635",
                    "on-primary-fixed-variant": "#4f378a",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#f2ecf4",
                    "secondary-fixed": "#e9ddff",
                    "surface-container-low": "#f8f2fa",
                    "surface-tint": "#6750a4",
                    "background": "#fdf7ff",
                    "on-primary-fixed": "#22005d",
                    "primary-container": "#6750a4",
                    "on-background": "#1d1b20",
                    "tertiary-container": "#c9a74d",
                    "error": "#ba1a1a",
                    "surface-bright": "#fdf7ff",
                    "inverse-primary": "#cfbcff",
                    "primary": "#4f378a",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#241a00",
                    "primary-fixed": "#e9ddff",
                    "on-surface": "#1d1b20",
                    "tertiary-fixed": "#ffdf93",
                    "on-primary-container": "#e0d2ff",
                    "surface-container-highest": "#e6e0e9",
                    "on-tertiary-container": "#503d00",
                    "outline-variant": "#cbc4d2",
                    "on-tertiary-fixed-variant": "#594400",
                    "surface": "#fdf7ff",
                    "inverse-on-surface": "#f5eff7",
                    "outline": "#7a7582",
                    "on-primary": "#ffffff",
                    "secondary": "#63597c",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#cfbcff",
                    "on-secondary": "#ffffff",
                    "fittrack-black": "#161616",
                    "fittrack-white": "#FFFFFF",
                    "fittrack-bg": "#F6F6F4",
                    "fittrack-border": "#E4E4E1",
                    "fittrack-red": "#D6321F"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px",
                    "btn": "8px"
            },
            "spacing": {
                    "stack-lg": "32px",
                    "stack-md": "16px",
                    "container-padding": "24px",
                    "stack-sm": "8px",
                    "gutter": "16px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "label": ["Inter"],
                    "display": ["Inter"],
                    "body-lg": ["Inter"],
                    "data-lg": ["JetBrains Mono"],
                    "headline": ["Inter"],
                    "data-sm": ["JetBrains Mono"]
            },
            "fontSize": {
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500", "textTransform": "uppercase"}],
                    "display": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "data-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "headline": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "data-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        /* Utility overrides to match spec exactly */
        .fittrack-input:focus {
            outline: none;
            border-bottom-width: 2px;
            border-bottom-color: #161616;
            margin-bottom: -1px; /* prevent layout shift */
        }
        .uppercase-forced { text-transform: uppercase; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F6F6F4] text-on-background font-body-sm min-h-screen flex flex-col antialiased selection:bg-surface-dim">
<!-- Top App Bar (Destination Nav suppressed for Transactional Screen, using simple header) -->
<header class="bg-[#FFFFFF] flex justify-between items-center w-full px-container-padding h-16 border-b border-[#E4E4E1] sticky top-0 z-40">
<button aria-label="Go Back" class="w-10 h-10 flex items-center justify-center -ml-2 text-on-surface-variant hover:bg-surface-container transition-colors rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">close</span>
</button>
<h1 class="font-headline text-headline text-on-background font-bold tracking-tight">Edit Member</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-gutter py-stack-md flex flex-col gap-stack-lg max-w-2xl mx-auto w-full pb-32">
<!-- Member Details Section -->
<section class="bg-[#FFFFFF] border border-[#E4E4E1] rounded-none flex flex-col">
<!-- Name Field -->
<div class="flex flex-col border-b border-[#E4E4E1] relative px-4 py-3">
<label class="font-label text-label uppercase-forced text-on-surface-variant mb-1" for="memberName">Name</label>
<input class="w-full bg-transparent font-body-lg text-on-background p-0 border-none focus:ring-0 fittrack-input placeholder:text-outline-variant" id="memberName" placeholder="Enter member name" type="text" value="Sarah Jenkins"/>
</div>
<!-- Phone Field -->
<div class="flex flex-col relative px-4 py-3">
<label class="font-label text-label uppercase-forced text-on-surface-variant mb-1" for="memberPhone">Phone Number</label>
<input class="w-full bg-transparent font-data-lg text-on-background p-0 border-none focus:ring-0 fittrack-input placeholder:text-outline-variant" id="memberPhone" placeholder="Enter phone number" type="tel" value="555-123-4567"/>
</div>
</section>
<!-- Plan Selection Section -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label text-label uppercase-forced text-on-surface-variant px-1">Plan Selection</h2>
<div class="grid grid-cols-2 gap-0 border border-[#E4E4E1] bg-[#FFFFFF]">
<button class="py-3 px-4 font-body-sm text-center border-r border-[#E4E4E1] transition-colors focus:outline-none" type="button">
                    Basic
                </button>
<button class="py-3 px-4 font-body-sm text-center bg-[#161616] text-[#FFFFFF] font-medium transition-colors focus:outline-none" type="button">
                    Premium
                </button>
</div>
</section>
<!-- Duration Section -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label text-label uppercase-forced text-on-surface-variant px-1">Duration</h2>
<div class="grid grid-cols-3 gap-0 border border-[#E4E4E1] bg-[#FFFFFF]">
<button class="py-3 px-2 font-body-sm text-center border-r border-[#E4E4E1] transition-colors focus:outline-none" type="button">
                    1 Mo
                </button>
<button class="py-3 px-2 font-body-sm text-center border-r border-[#E4E4E1] bg-[#161616] text-[#FFFFFF] font-medium transition-colors focus:outline-none" type="button">
                    6 Mo
                </button>
<button class="py-3 px-2 font-body-sm text-center transition-colors focus:outline-none" type="button">
                    1 Yr
                </button>
</div>
</section>
<!-- Destructive Action -->
<section class="mt-stack-lg">
<button class="w-full py-4 px-4 bg-[#FFFFFF] border border-[#D6321F] rounded-btn flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-[#D6321F] focus:ring-offset-2 focus:ring-offset-[#F6F6F4] transition-opacity hover:opacity-80" type="button">
<span class="font-body-lg text-[#D6321F] font-medium">Remove Member</span>
</button>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-[#F6F6F4] border-t border-[#E4E4E1] p-gutter z-50 pt-4 pb-safe-8">
<div class="max-w-2xl mx-auto">
<button class="w-full h-12 bg-[#161616] text-[#FFFFFF] font-body-lg font-medium rounded-btn flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-[#161616] focus:ring-offset-2 focus:ring-offset-[#F6F6F4] transition-opacity hover:opacity-90" type="button">
                Save Changes
            </button>
</div>
</div>
<style>
        /* iOS Safe Area Support */
        .pb-safe-8 { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    </style>
</body></html>
