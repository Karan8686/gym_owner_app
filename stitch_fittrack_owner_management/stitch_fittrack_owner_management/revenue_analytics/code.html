<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Revenue Analytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#322f35",
                        "tertiary": "#765b00",
                        "surface-dim": "#ded8e0",
                        "on-secondary-fixed-variant": "#4b4263",
                        "tertiary-fixed-dim": "#e7c365",
                        "secondary-fixed-dim": "#cdc0e9",
                        "surface-container-high": "#ece6ee",
                        "on-secondary-container": "#645a7d",
                        "secondary-container": "#e1d4fd",
                        "surface-variant": "#e6e0e9",
                        "on-surface-variant": "#494551",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#1f1635",
                        "on-primary-fixed-variant": "#4f378a",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f2ecf4",
                        "secondary-fixed": "#e9ddff",
                        "surface-container-low": "#f8f2fa",
                        "surface-tint": "#6750a4",
                        "background": "#fdf7ff",
                        "on-primary-fixed": "#22005d",
                        "primary-container": "#6750a4",
                        "on-background": "#1d1b20",
                        "tertiary-container": "#c9a74d",
                        "error": "#ba1a1a",
                        "surface-bright": "#fdf7ff",
                        "inverse-primary": "#cfbcff",
                        "primary": "#4f378a",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#241a00",
                        "primary-fixed": "#e9ddff",
                        "on-surface": "#1d1b20",
                        "tertiary-fixed": "#ffdf93",
                        "on-primary-container": "#e0d2ff",
                        "surface-container-highest": "#e6e0e9",
                        "on-tertiary-container": "#503d00",
                        "outline-variant": "#cbc4d2",
                        "on-tertiary-fixed-variant": "#594400",
                        "surface": "#fdf7ff",
                        "inverse-on-surface": "#f5eff7",
                        "outline": "#7a7582",
                        "on-primary": "#ffffff",
                        "secondary": "#63597c",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#cfbcff",
                        "on-secondary": "#ffffff",
                        // Custom Brand Colors for this specific request
                        "brand-bg": "#F6F6F4",
                        "brand-border": "#E4E4E1",
                        "brand-ink": "#161616",
                        "brand-grey": "#7a7582" // Mapping to outline
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "btn": "8px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "container-padding": "24px",
                        "stack-sm": "8px",
                        "gutter": "16px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "label": ["Inter"],
                        "display": ["Inter"],
                        "body-lg": ["Inter"],
                        "data-lg": ["JetBrains Mono"],
                        "headline": ["Inter"],
                        "data-sm": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "display": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "data-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "headline": ["18px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F6F6F4; /* Enforcing custom background */
            color: #161616; /* Enforcing custom text color */
        }
        /* Hide scrollbar for clean minimal look */
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col md:hidden pb-14"> <!-- pb-14 for bottom nav -->
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-container-padding h-16 bg-brand-bg border-b border-brand-border sticky top-0 z-10">
<div class="flex items-center gap-4">
<button class="text-brand-ink hover:bg-surface-container-high p-2 -ml-2 rounded-full transition-colors">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline text-headline font-black text-brand-ink">FitTrack Owner</h1>
</div>
<button class="text-brand-ink hover:bg-surface-container-high p-2 -mr-2 rounded-full transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col pt-8 pb-container-padding">
<!-- Key Metric -->
<section class="px-container-padding mb-stack-lg flex flex-col items-start">
<h2 class="font-data-lg text-4xl font-bold tracking-tight mb-2 text-brand-ink">₹1,42,500</h2>
<div class="flex flex-col gap-1">
<p class="font-body-sm text-body-sm text-brand-grey">This Month</p>
<div class="flex items-center gap-2">
<span class="font-body-sm text-body-sm font-medium text-brand-ink">+12%</span>
<span class="font-body-sm text-body-sm text-brand-grey">vs last month</span>
</div>
</div>
</section>
<!-- Chart Section -->
<section class="px-container-padding mb-stack-lg w-full">
<div class="border border-brand-border bg-white pt-6 pb-4 px-4">
<!-- Simple Bar Chart Container -->
<div class="flex items-end justify-between h-48 border-b border-brand-border pb-2 relative">
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between pointer-events-none pb-2">
<div class="w-full border-t border-brand-border h-0 opacity-50"></div>
<div class="w-full border-t border-brand-border h-0 opacity-50"></div>
<div class="w-full border-t border-brand-border h-0 opacity-50"></div>
<div class="w-full border-t border-brand-border h-0 opacity-50"></div>
</div>
<!-- Bars -->
<div class="w-6 bg-brand-ink h-[40%] z-10"></div>
<div class="w-6 bg-brand-ink h-[55%] z-10"></div>
<div class="w-6 bg-brand-ink h-[45%] z-10"></div>
<div class="w-6 bg-brand-ink h-[70%] z-10"></div>
<div class="w-6 bg-brand-ink h-[85%] z-10"></div>
<div class="w-6 bg-brand-ink h-[100%] z-10"></div>
</div>
<!-- X-Axis Labels -->
<div class="flex justify-between mt-3 px-1">
<span class="font-label text-[10px] uppercase text-brand-grey">Jan</span>
<span class="font-label text-[10px] uppercase text-brand-grey">Feb</span>
<span class="font-label text-[10px] uppercase text-brand-grey">Mar</span>
<span class="font-label text-[10px] uppercase text-brand-grey">Apr</span>
<span class="font-label text-[10px] uppercase text-brand-grey">May</span>
<span class="font-label text-[10px] uppercase text-brand-grey text-brand-ink font-bold">Jun</span>
</div>
</div>
</section>
<!-- Breakdown Section -->
<section class="px-container-padding flex flex-col gap-4">
<h3 class="font-label text-label uppercase text-brand-grey mb-2">Breakdown</h3>
<div class="bg-white border border-brand-border rounded-none flex flex-col">
<!-- Row 1 -->
<div class="flex justify-between items-center py-3 px-4 border-b border-brand-border">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-brand-ink">Weight Only</span>
<span class="font-body-sm text-body-sm text-brand-grey">142 members</span>
</div>
<span class="font-data-lg text-data-lg font-bold text-brand-ink">₹85,200</span>
</div>
<!-- Row 2 -->
<div class="flex justify-between items-center py-3 px-4">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-brand-ink">Cardio + Weight</span>
<span class="font-body-sm text-body-sm text-brand-grey">65 members</span>
</div>
<span class="font-data-lg text-data-lg font-bold text-brand-ink">₹57,300</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-surface px-gutter border-t border-brand-border h-14 z-50">
<!-- Assuming Dashboard is Active based on context -->
<a class="text-brand-ink font-bold border-b-2 border-brand-ink h-full flex items-center justify-center px-4 font-label text-label uppercase opacity-80" href="#">
            Dashboard
        </a>
<a class="text-brand-grey h-full flex items-center justify-center px-4 font-label text-label uppercase hover:text-brand-ink" href="#">
            Members
        </a>
<a class="text-brand-grey h-full flex items-center justify-center px-4 font-label text-label uppercase hover:text-brand-ink" href="#">
            Payments
        </a>
<a class="text-brand-grey h-full flex items-center justify-center px-4 font-label text-label uppercase hover:text-brand-ink" href="#">
            Workouts
        </a>
<a class="text-brand-grey h-full flex items-center justify-center px-4 font-label text-label uppercase hover:text-brand-ink" href="#">
            More
        </a>
</nav>
</body></html>
